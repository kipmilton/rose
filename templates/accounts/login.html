{% extends 'base.html' %}
{% load static %}

{% block title %}Login - MasterCBC {% endblock %}

{% block Content %}
  <section class="login-section py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <h2 class="text-center mb-4">MasterCBC Login.</h2>
              {% if messages %}
        <div class="message-box">
            {% for message in messages %}
                <p class="alert {{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
             {% endif %}
              <form action="{% url 'myapp:login_page' %}" method="POST">
                {% csrf_token %}                
                <div class="form-group mb-3">
                  <label for="username" class="form-label">Sudent Admission No./Username</label>
                  <input type="text" class="form-control" id="username" name="username" placeholder="Enter your admission no./username" required>
                </div>
                <div class="form-group mb-3">
                  <label for="password" class="form-label">Password</label>
                  <div class="position-relative">
                    <input type="password" class="form-control password-input" id="password" name="password" placeholder="Enter your password" required>
                    <button type="button" class="btn btn-sm position-absolute end-0 top-50 translate-middle-y" style="border: none; background: none; padding: 0.5rem;" onclick="togglePasswordVisibility('password')">
                      <i class="bi bi-eye-fill" id="password-icon" style="font-size: 1rem;">👀</i>
                    </button>
                  </div>
                </div>
                <div class="form-group form-check mb-3">
                  <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                  <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">Login</button>
                </div>
              </form>
              <div class="text-center mt-3">
                <button><a href="#"></a></button><br>
                <a href="{% url 'myapp:register' %}">Create an account</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <style>
    .password-toggle-btn {
      cursor: pointer;
      color: #6c757d;
      transition: color 0.3s ease;
    }
    .password-toggle-btn:hover {
      color: #0d6efd;
    }
  </style>

  <script>
    function togglePasswordVisibility(fieldId) {
      const input = document.getElementById(fieldId);
      const icon = document.getElementById(fieldId + '-icon');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
      } else {
        input.type = 'password';
        icon.textContent = '👀';
      }
    }
  </script>
{% endblock %}
